# -------------------------------
# App
# -------------------------------
spring.application.name=novaevents
spring.mvc.hiddenmethod.filter.enabled=true

# -------------------------------
# Database (MySQL)
# -------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/novaevents?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------
# JPA / Hibernate
# -------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# -------------------------------
# Logging (debug útil)
# -------------------------------
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# -------------------------------
# Weather API
# -------------------------------
weather.api.key=${WEATHER_API_KEY:}
weather.api.url=https://api.openweathermap.org/data/2.5

# -------------------------------
# Server (opcional)
# -------------------------------
server.port=8080