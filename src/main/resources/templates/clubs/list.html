<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clubs')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <h1 class="mb-4 fw-bold">Campus Clubs</h1>

    <table class="table table-hover shadow-sm rounded">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
            <th>Events</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="club : ${clubs}">
            <td class="fw-semibold" th:text="${club.name}"></td>
            <td>
                <span th:class="${'badge rounded-pill ' +
                    (club.category.name() == 'TECHNOLOGY' ? 'bg-primary' :
                    (club.category.name() == 'ARTS' ? 'bg-warning text-dark' :
                    (club.category.name() == 'SPORTS' ? 'bg-success' :
                    (club.category.name() == 'ACADEMIC' ? 'bg-info text-dark' :
                    (club.category.name() == 'CULTURAL' ? 'bg-dark' : 'bg-secondary')))))}"
                      th:text="${club.category}">
                </span>
            </td>
            <td>
                <details>
                    <summary class="text-muted" th:text="'▶ ' + ${#strings.abbreviate(club.description, 50) + '...'}"></summary>
                    <p class="mt-2" th:text="${club.description}"></p>
                </details>
            </td>
            <td th:text="${eventCounts[club.id] ?: 0}"></td>  <!-- NOVO, antes do td de Actions -->
            <td>
                <a th:href="@{/clubs/{id}(id=${club.id})}"
                   class="btn btn-sm btn-outline-primary">View Details</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
