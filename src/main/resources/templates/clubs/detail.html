<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Club Detail')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <h1 class="fw-bold" th:text="${club.name}"></h1>
    <span th:class="${'badge rounded-pill ' +
        (club.category.name() == 'TECHNOLOGY' ? 'bg-primary' :
        (club.category.name() == 'ARTS' ? 'bg-warning text-dark' :
        (club.category.name() == 'SPORTS' ? 'bg-success' :
        (club.category.name() == 'ACADEMIC' ? 'bg-info text-dark' :
        (club.category.name() == 'CULTURAL' ? 'bg-dark' : 'bg-secondary')))))}"
          th:text="${club.category}">
    </span>
    <p class="mt-3" th:text="${club.description}"></p>
    <a th:href="@{/clubs/{id}/events(id=${club.id})}" class="btn btn-outline-primary">View Events</a>
    <a th:href="@{/clubs/{id}/events/new(id=${club.id})}" class="btn btn-success">+ Add Event</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
