<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Delete Event')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <h1 class="fw-bold">Delete Event</h1>
    <p class="text-muted">Are you sure you want to delete the following event?</p>

    <div class="card mt-3">
        <div class="card-body">
            <p><strong>Name</strong><br><span th:text="${event.name}"></span></p>
            <p><strong>Date</strong><br><span th:text="${#temporals.format(event.date, 'dd MMM yyyy')}"></span></p>
            <p><strong>Type</strong><br><span th:text="${event.type?.name}"></span></p>
            <p><strong>Location</strong><br><span th:text="${event.location ?: 'N/A'}"></span></p>
            <p><strong>Club</strong><br><span th:text="${club.name}"></span></p>
        </div>
    </div>

    <form th:action="@{/clubs/{clubId}/events/{id}(clubId=${club.id},id=${event.id})}"
          method="post" class="mt-3">
        <input type="hidden" name="_method" value="DELETE">
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a th:href="@{/clubs/{clubId}/events/{id}(clubId=${club.id},id=${event.id})}"
           class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
