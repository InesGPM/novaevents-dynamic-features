<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('All Events')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <h1 class="fw-bold mb-4">All Events</h1>

    <div class="card mb-4">
        <div class="card-header">Filter Events</div>
        <div class="card-body">
            <form th:action="@{/events}" method="get">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Event Type</label>
                        <select name="typeId" class="form-select">
                            <option value="">All types</option>
                            <option th:each="t : ${eventTypes}"
                                    th:value="${t.id}" th:text="${t.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Club</label>
                        <select name="clubId" class="form-select">
                            <option value="">All clubs</option>
                            <option th:each="c : ${clubs}"
                                    th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Filter</button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/events}" class="btn btn-outline-secondary w-100">Clear</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-hover">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Club</th>
            <th>Date</th>
            <th>Type</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="event : ${events}">
            <td>
                <a th:href="@{/clubs/{clubId}/events/{id}(clubId=${event.club?.id},id=${event.id})}"
                   th:text="${event.name}"></a>
            </td>
            <td>
                <a th:href="@{/clubs/{id}(id=${event.club?.id})}"
                   th:text="${clubMap[event.club?.id]}"></a>
            </td>
            <td th:text="${#temporals.format(event.date, 'dd MMM yyyy')}"></td>
            <td><span class="badge bg-secondary" th:text="${event.type?.name}"></span></td>
            <td th:text="${event.location}"></td>
            <td>
                <a th:href="@{/clubs/{clubId}/events/{id}/edit(clubId=${event.club?.id},id=${event.id})}"
                   class="btn btn-sm btn-outline-primary">Edit</a>
                <a th:href="@{/clubs/{clubId}/events/{id}/delete(clubId=${event.club?.id},id=${event.id})}"
                   class="btn btn-sm btn-outline-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
