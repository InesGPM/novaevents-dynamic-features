<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Event Detail')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <h1 class="fw-bold" th:text="${event.name}"></h1>

    <div class="card mt-3">
        <div class="card-body">
            <p><strong>Date</strong><br><span th:text="${#temporals.format(event.date, 'dd MMM yyyy')}"></span></p>
            <p><strong>Type</strong><br><span class="badge bg-secondary" th:text="${event.type?.name}"></span></p>
            <p><strong>Location</strong><br><span th:text="${event.location ?: 'N/A'}"></span></p>
            <p><strong>Description</strong><br><span th:text="${event.description ?: 'N/A'}"></span></p>
            <p><strong>Club</strong><br>
                <a th:href="@{/clubs/{id}(id=${club.id})}" th:text="${club.name}"></a>
            </p>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/clubs/{clubId}/events/{id}/edit(clubId=${club.id},id=${event.id})}"
           class="btn btn-outline-primary">Edit</a>
        <a th:href="@{/clubs/{clubId}/events/{id}/delete(clubId=${club.id},id=${event.id})}"
           class="btn btn-outline-danger">Delete</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
