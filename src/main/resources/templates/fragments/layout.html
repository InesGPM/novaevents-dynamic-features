<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Nova Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/clubs}">Nova Events</a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/clubs}">Clubs</a>
            <a class="nav-link" th:href="@{/events}">Events</a>
        </div>

        <div class="d-flex align-items-center gap-2">

            <span sec:authorize="isAuthenticated()" id="navbar-username" class="text-white">
                <span sec:authentication="name"></span>
            </span>

            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>

        </div>
    </div>
</nav>

</body>
</html>
